<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIXAA Stream | منصة المشاهدة الأولى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #060606; color: #fff; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(to top, #060606, transparent); }
        .movie-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .movie-card:hover { transform: scale(1.08); z-index: 10; }
        .category-btn.active { background-color: #e11d48; color: white; border-color: #e11d48; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #060606; }
        ::-webkit-scrollbar-thumb { background: #e11d48; border-radius: 10px; }
        #video-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; }
    </style>
</head>
<body>

    <div id="video-overlay" class="p-4">
        <div class="flex justify-between items-center w-full max-w-6xl mb-4">
            <h2 id="playing-title" class="text-rose-600 font-bold">جاري التشغيل...</h2>
            <div class="flex gap-2">
                <button onclick="switchServer()" class="bg-zinc-800 px-4 py-2 rounded-lg text-xs hover:bg-zinc-700">تبديل السيرفر</button>
                <button onclick="closePlayer()" class="bg-rose-600 text-white px-4 py-2 rounded-lg font-bold">إغلاق ×</button>
            </div>
        </div>
        <iframe id="video-iframe" src="" allowfullscreen class="w-full max-w-6xl h-[70vh] border-2 border-rose-600/20 shadow-2xl shadow-rose-600/10 rounded-2xl"></iframe>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-gradient-to-b from-black/80 to-transparent backdrop-blur-sm px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-black text-rose-600 tracking-tighter italic">FIXAA<span class="text-white">STREAM</span></h1>
        <div class="flex items-center gap-4">
            <input type="text" id="search" placeholder="ابحث عن فيلم..." class="hidden md:block bg-black/40 border border-white/10 rounded-full px-5 py-2 text-sm focus:border-rose-600 outline-none w-64 transition-all">
            <div class="w-10 h-10 rounded-full bg-rose-600 flex items-center justify-center font-bold">M</div>
        </div>
    </nav>

    <div id="hero" class="relative h-[70vh] w-full flex items-end p-8 md:p-20 overflow-hidden">
        <img id="hero-img" src="" class="absolute inset-0 w-full h-full object-cover -z-10 animate-pulse bg-zinc-900">
        <div class="absolute inset-0 hero-gradient -z-10"></div>
        <div class="max-w-2xl space-y-4">
            <span class="bg-rose-600 text-[10px] uppercase font-bold px-2 py-1 rounded">الأكثر مشاهدة اليوم</span>
            <h2 id="hero-title" class="text-4xl md:text-6xl font-black">...</h2>
            <p id="hero-desc" class="text-gray-300 text-sm md:text-base line-clamp-3">...</p>
            <div class="flex gap-4">
                <button id="hero-play" class="bg-white text-black px-8 py-3 rounded-lg font-bold hover:bg-rose-600 hover:text-white transition">▶ شاهد الآن</button>
            </div>
        </div>
    </div>

    <div class="px-6 py-8 overflow-x-auto no-scrollbar flex gap-3 sticky top-[72px] bg-[#060606] z-40 shadow-xl">
        <button onclick="loadCategory('trending', this)" class="category-btn active border border-white/10 px-6 py-2 rounded-full whitespace-nowrap text-sm font-bold transition">الكل</button>
        <button onclick="loadCategory('28', this)" class="category-btn border border-white/10 px-6 py-2 rounded-full whitespace-nowrap text-sm font-bold transition">أكشن</button>
        <button onclick="loadCategory('16', this)" class="category-btn border border-white/10 px-6 py-2 rounded-full whitespace-nowrap text-sm font-bold transition">كرتون & أنمي</button>
        <button onclick="loadCategory('27', this)" class="category-btn border border-white/10 px-6 py-2 rounded-full whitespace-nowrap text-sm font-bold transition">رعب</button>
        <button onclick="loadCategory('35', this)" class="category-btn border border-white/10 px-6 py-2 rounded-full whitespace-nowrap text-sm font-bold transition">كوميدي</button>
        <button onclick="loadCategory('878', this)" class="category-btn border border-white/10 px-6 py-2 rounded-full whitespace-nowrap text-sm font-bold transition">خيال علمي</button>
    </div>

    <main class="px-6 pb-20">
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <script>
        const API_KEY = '551fccd1a3a8def119305ff94bb4e1d1';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/original';
        const SERVERS = [
            'https://vidsrc.me/embed/movie?tmdb=',
            'https://vidsrc.to/embed/movie/'
        ];
        let currentServerIdx = 0;
        let currentMovieId = '';

        // البداية
        async function init() {
            const res = await fetch(`${BASE_URL}/trending/movie/day?api_key=${API_KEY}&language=ar-SA`);
            const data = await res.json();
            const topMovie = data.results[0];
            
            // تحديث الـ Hero
            document.getElementById('hero-img').src = IMG_URL + topMovie.backdrop_path;
            document.getElementById('hero-title').innerText = topMovie.title;
            document.getElementById('hero-desc').innerText = topMovie.overview;
            document.getElementById('hero-play').onclick = () => openPlayer(topMovie.id, topMovie.title);
            
            renderMovies(data.results);
        }

        // جلب الأقسام
        async function loadCategory(genreId, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            let url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&language=ar-SA&sort_by=popularity.desc&with_genres=${genreId}`;
            if(genreId === 'trending') url = `${BASE_URL}/trending/movie/day?api_key=${API_KEY}&language=ar-SA`;
            
            const res = await fetch(url);
            const data = await res.json();
            renderMovies(data.results);
            window.scrollTo({top: 500, behavior: 'smooth'});
        }

        function renderMovies(movies) {
            const grid = document.getElementById('grid');
            grid.innerHTML = movies.map(m => `
                <div class="movie-card group" onclick="openPlayer('${m.id}', '${m.title}')">
                    <div class="relative aspect-[2/3] rounded-xl overflow-hidden shadow-lg border border-white/5">
                        <img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w500' + m.poster_path : 'https://via.placeholder.com/500x750'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all flex flex-col justify-end p-4">
                            <span class="text-xs text-rose-500 font-bold">⭐ ${m.vote_average.toFixed(1)}</span>
                            <p class="text-[10px] text-gray-300 line-clamp-2">${m.overview}</p>
                        </div>
                    </div>
                    <h3 class="mt-3 text-xs font-bold truncate group-hover:text-rose-600 transition">${m.title}</h3>
                </div>
            `).join('');
        }

        // المشغل
        window.openPlayer = (id, title) => {
            currentMovieId = id;
            document.getElementById('playing-title').innerText = "مشاهدة: " + title;
            updateIframe();
            document.getElementById('video-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        window.switchServer = () => {
            currentServerIdx = currentServerIdx === 0 ? 1 : 0;
            updateIframe();
        };

        function updateIframe() {
            document.getElementById('video-iframe').src = SERVERS[currentServerIdx] + currentMovieId;
        }

        window.closePlayer = () => {
            document.getElementById('video-overlay').style.display = 'none';
            document.getElementById('video-iframe').src = "";
            document.body.style.overflow = 'auto';
        };

        // البحث
        document.getElementById('search').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${e.target.value}&language=ar-SA`);
                const data = await res.json();
                renderMovies(data.results);
            }
        });

        init();
    </script>
</body>
</html>
