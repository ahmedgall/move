<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIXAA STREAM | المترجم الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #060606; color: #fff; overflow-x: hidden; }
        #video-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .player-container { width: 100%; max-width: 1000px; position: relative; }
        iframe { width: 100%; height: 60vh; border-radius: 15px; border: 2px solid #e11d48; }
        .sub-control { background: rgba(225, 29, 72, 0.1); border: 1px dashed #e11d48; padding: 15px; border-radius: 12px; margin-bottom: 15px; width: 100%; max-width: 1000px; }
    </style>
</head>
<body>

    <div id="video-overlay">
        <div class="sub-control flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="text-right">
                <h2 id="playing-title" class="font-bold text-rose-600">اسم الفيلم</h2>
                <p class="text-[10px] text-zinc-400">إذا لم تعمل الترجمة التلقائية، حمل ملف (SRT) وارفعها هنا</p>
            </div>
            
            <div class="flex items-center gap-2">
                <label class="bg-zinc-800 px-4 py-2 rounded-lg text-xs cursor-pointer hover:bg-zinc-700 transition">
                    📁 رفع ملف ترجمة خارجي
                    <input type="file" id="sub-file" accept=".srt,.vtt" class="hidden" onchange="handleSubtitle(this)">
                </label>
                <button onclick="closePlayer()" class="bg-rose-600 px-6 py-2 rounded-lg font-bold text-sm">إغلاق ×</button>
            </div>
        </div>

        <div class="player-container">
            <iframe id="video-iframe" src="" allowfullscreen></iframe>
        </div>
        
        <div class="mt-4 flex gap-2" id="server-list"></div>
    </div>

    <nav class="p-6 border-b border-white/5 flex justify-between items-center">
        <h1 class="text-2xl font-black text-rose-600 italic">FIXAA<span class="text-white">STREAM</span></h1>
        <p class="text-[10px] text-zinc-500 italic">نظام المترجم الخارجي v2.0</p>
    </nav>

    <main class="p-8 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6" id="grid"></main>

    <script>
        const API_KEY = '551fccd1a3a8def119305ff94bb4e1d1';
        const SERVERS = [
            { name: 'سيرفر VIP (عربي)', url: 'https://vidsrc.cc/v2/embed/movie/' },
            { name: 'سيرفر 2 (متعدد)', url: 'https://vidsrc.xyz/embed/movie/' }
        ];
        let currentMovieId = '';

        // جلب الأفلام
        async function fetchMovies() {
            const res = await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}&language=ar-SA`);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.results.map(m => `
                <div onclick="openPlayer('${m.id}', '${m.title}')" class="cursor-pointer group">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="rounded-xl group-hover:ring-2 ring-rose-600 transition">
                    <h3 class="text-xs mt-2 font-bold truncate">${m.title}</h3>
                </div>
            `).join('');
        }

        window.openPlayer = (id, title) => {
            currentMovieId = id;
            document.getElementById('playing-title').innerText = title;
            document.getElementById('video-overlay').style.display = 'flex';
            
            const serverList = document.getElementById('server-list');
            serverList.innerHTML = SERVERS.map((s, idx) => `
                <button onclick="changeServer('${s.url}', ${idx})" class="bg-zinc-800 text-[10px] px-4 py-2 rounded ${idx===0?'ring-1 ring-rose-600':''}">
                    ${s.name}
                </button>
            `).join('');
            
            changeServer(SERVERS[0].url, 0);
        };

        window.changeServer = (url, idx) => {
            // إضافة برامتر الترجمة العربية للسيرفر
            document.getElementById('video-iframe').src = url + currentMovieId + "?sub_ar=1";
        };

        // وظيفة المترجم الخارجي (شرح الطريقة)
        function handleSubtitle(input) {
            if (input.files && input.files[0]) {
                alert("تم رفع ملف: " + input.files[0].name + "\n\nملحوظة للمطور مروان: السيرفرات الخارجية (Iframe) تمنع حقن ملفات ترجمة من خارج نطاقها لأسباب أمنية. أفضل طريقة هي الضغط على زرار CC داخل المشغل بعد رفع الملف.");
                // تقنياً: لا يمكن دمج ملف من جهازك داخل Iframe لموقع آخر بسهولة
                // الحل العملي هو استخدام سيرفر vidsrc.me لأنه يتيح خاصية تحميل ترجمة يدوية من داخل المشغل نفسه
            }
        }

        window.closePlayer = () => {
            document.getElementById('video-overlay').style.display = 'none';
            document.getElementById('video-iframe').src = "";
        };

        fetchMovies();
    </script>
</body>
</html>
