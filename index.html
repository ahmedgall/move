<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فيكساا سينما | مشاهدة مباشرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        .movie-card { cursor: pointer; transition: 0.3s; }
        .movie-card:hover { transform: translateY(-10px); }
        /* تصميم المشغل */
        #video-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; }
        iframe { width: 90%; height: 80%; border-radius: 15px; border: 2px solid #e11d48; }
    </style>
</head>
<body class="p-6">

    <div id="video-overlay">
        <button onclick="closePlayer()" class="absolute top-5 right-5 bg-rose-600 text-white px-4 py-2 rounded-full font-bold">إغلاق ×</button>
        <iframe id="video-iframe" src="" allowfullscreen></iframe>
    </div>

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-3xl font-extrabold text-rose-600 tracking-tighter">FIXAA <span class="text-white">MOVIES</span></h1>
            <input type="text" id="search" placeholder="ابحث عن فيلم للمشاهدة..." 
                   class="w-full md:w-96 bg-zinc-900 border border-zinc-800 rounded-full px-6 py-3 outline-none focus:border-rose-600 transition">
        </div>

        <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
    </div>

    <script>
        const API_KEY = '551fccd1a3a8def119305ff94bb4e1d1';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';

        // سيرفر المشاهدة (Vidsrc هو الأشهر للمطورين)
        const WATCH_SERVER = 'https://vidsrc.me/embed/movie?tmdb=';

        async function fetchMovies(query = '') {
            const url = query 
                ? `${BASE_URL}/search/movie?api_key=${API_KEY}&query=${query}&language=ar-SA`
                : `${BASE_URL}/trending/movie/week?api_key=${API_KEY}&language=ar-SA`;
            
            const res = await fetch(url);
            const data = await res.json();
            renderMovies(data.results);
        }

        function renderMovies(movies) {
            const grid = document.getElementById('grid');
            grid.innerHTML = movies.map(m => `
                <div class="movie-card bg-zinc-900 rounded-2xl overflow-hidden shadow-2xl" onclick="openPlayer('${m.id}')">
                    <div class="relative aspect-[2/3]">
                        <img src="${m.poster_path ? IMG_URL + m.poster_path : 'https://via.placeholder.com/500x750'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition">
                             <span class="bg-rose-600 p-3 rounded-full text-white font-bold">▶ شاهد الآن</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-sm truncate">${m.title}</h3>
                    </div>
                </div>
            `).join('');
        }

        // وظائف المشغل
        window.openPlayer = (id) => {
            const overlay = document.getElementById('video-overlay');
            const iframe = document.getElementById('video-iframe');
            iframe.src = WATCH_SERVER + id; // ربط الـ ID بسيرفر المشاهدة
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // منع السكرول أثناء المشاهدة
        };

        window.closePlayer = () => {
            const overlay = document.getElementById('video-overlay');
            const iframe = document.getElementById('video-iframe');
            iframe.src = ""; // قفل الفيديو عشان الصوت يوقف
            overlay.style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        document.getElementById('search').addEventListener('input', (e) => {
            if(e.target.value.length > 2) fetchMovies(e.target.value);
            else if(e.target.value.length === 0) fetchMovies();
        });

        fetchMovies();
    </script>
</body>
</html>
